name: AlphaBrief Morning Stock Brief

on:
  schedule:
    # 7 AM Central Time
    - cron: '0 12 * * 1-5'   # 7 AM CDT (summer)
    - cron: '0 13 * * 1-5'   # 7 AM CST (winter)

  workflow_dispatch:

jobs:
  run-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verify 7 AM Central Time
        id: check
        run: |
          HOUR=$(TZ="America/Chicago" date +%H)

          echo "Central hour: $HOUR"

          if [ "$HOUR" = "07" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repo
        if: steps.check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: pip install -r requirements.txt

      - name: Run AlphaBrief
        if: steps.check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/main.py
